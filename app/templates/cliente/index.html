<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes – AAPM SENAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f4f4f4; display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar { width: 180px; background: #1a1a2e; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 20px 16px 14px; border-bottom: 1px solid #2d2d4e; }
    .sidebar-logo .brand { font-weight: 700; font-size: 16px; color: #fff; letter-spacing: 1px; }
    .sidebar-logo .brand span { color: #cc2936; }
    .sidebar-menu-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; padding: 16px 16px 6px; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: #aaa; font-size: 13px; cursor: pointer; transition: background 0.15s; }
    .sidebar-item:hover { background: #2a2a4a; color: #fff; }
    .sidebar-item.active { background: #cc2936; color: #fff; }
    .sidebar-item i { font-size: 17px; }
    .sidebar-footer { margin-top: auto; padding: 14px 16px; border-top: 1px solid #2d2d4e; display: flex; align-items: center; gap: 8px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #cc2936; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .avatar-info { flex: 1; }
    .avatar-name { font-size: 12px; color: #fff; font-weight: 600; }
    .avatar-role { font-size: 10px; color: #888; }
    .logout { font-size: 11px; color: #888; cursor: pointer; }
    .logout:hover { color: #cc2936; }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; background: #fff; border-bottom: 1px solid #eee; }
    .page-title { font-size: 22px; font-weight: 700; color: #1a1a2e; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .search-box { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; background: #f9f9f9; }
    .search-box input { border: none; background: transparent; padding: 8px 12px; font-size: 13px; outline: none; width: 180px; font-family: inherit; color: #333; }
    .search-box button { background: #cc2936; border: none; padding: 8px 12px; cursor: pointer; color: #fff; display: flex; align-items: center; }
    .btn-new { background: #cc2936; color: #fff; border: none; padding: 9px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: inherit; }
    .btn-new:hover { background: #a81e28; }

    /* CONTENT */
    .content { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .tab-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: #555; font-family: inherit; transition: all 0.15s; }
    .tab-btn.active { background: #cc2936; color: #fff; border-color: #cc2936; }
    .tab-btn:hover:not(.active) { border-color: #cc2936; color: #cc2936; }

    /* GRID */
    .clients-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .client-card { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .client-num { font-size: 13px; color: #bbb; font-weight: 600; min-width: 20px; }
    .client-info { flex: 1; }
    .client-name { font-size: 13px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .client-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .tag-material { background: #e8f4fd; color: #1a6bb5; }
    .tag-uniforme { background: #f0faf3; color: #1a7a3c; }
    .tag-apostila { background: #fdf3e8; color: #b56a1a; }
    .tag-inativo { background: #f5e8e8; color: #a32d2d; }
    .client-type { font-size: 11px; color: #888; }
    .client-doc { font-size: 11px; color: #aaa; margin-top: 2px; }
    .client-amount { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-right: 8px; white-space: nowrap; }
    .actions { display: flex; gap: 5px; }
    .btn-icon { width: 30px; height: 30px; border: 1px solid #ddd; border-radius: 6px; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #666; transition: all 0.15s; }
    .btn-icon:hover { border-color: #cc2936; color: #cc2936; }
    .btn-icon.del:hover { background: #cc2936; color: #fff; border-color: #cc2936; }

    /* PAGINATION */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 16px 0 4px; }
    .page-btn { width: 30px; height: 30px; border: 1px solid #ddd; border-radius: 6px; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; color: #555; font-family: inherit; }
    .page-btn.active { background: #cc2936; color: #fff; border-color: #cc2936; font-weight: 700; }
    .page-btn:hover:not(.active) { border-color: #cc2936; color: #cc2936; }

    .empty-state { grid-column: 1/-1; text-align: center; padding: 50px 20px; color: #aaa; font-size: 14px; }
    .empty-state i { font-size: 36px; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">SENAI <span>///</span> AAPM</div>
    </div>
    <div class="sidebar-menu-label">Menu</div>
    <div class="sidebar-item"><i class="ti ti-layout-dashboard"></i> Painel</div>
    <div class="sidebar-item"><i class="ti ti-package"></i> Estoque</div>
    <div class="sidebar-item"><i class="ti ti-circle-plus"></i> Adicionar</div>
    <div class="sidebar-item"><i class="ti ti-chart-bar"></i> Relatórios</div>
    <div class="sidebar-item"><i class="ti ti-shopping-cart"></i> Vendas</div>
    <div class="sidebar-item active"><i class="ti ti-users"></i> Clientes</div>
    <div class="sidebar-footer">
      <div class="avatar">GS</div>
      <div class="avatar-info">
        <div class="avatar-name">Gidalva</div>
        <div class="avatar-role">Administrador</div>
      </div>
      <span class="logout">Sair</span>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="page-title">Clientes</div>
      <div class="topbar-right">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar cliente..." oninput="renderClients()">
          <button><i class="ti ti-search" style="font-size:15px"></i></button>
        </div>
        <button class="btn-new"><i class="ti ti-plus" style="font-size:15px"></i> Novo Cliente</button>
      </div>
    </div>

    <div class="content">
      <div class="filter-tabs">
        <button class="tab-btn active" onclick="setFilter('Todos', this)">Todos</button>
        <button class="tab-btn" onclick="setFilter('PF', this)">Pessoa Física</button>
        <button class="tab-btn" onclick="setFilter('PJ', this)">Pessoa Jurídica</button>
        <button class="tab-btn" onclick="setFilter('Inativo', this)">Inativos</button>
      </div>

      <div class="clients-grid" id="clientsGrid"></div>

      <div class="pagination">
        <div class="page-btn"><i class="ti ti-chevron-left" style="font-size:14px"></i></div>
        <div class="page-btn active">1</div>
        <div class="page-btn">2</div>
        <div class="page-btn">3</div>
        <div class="page-btn"><i class="ti ti-chevron-right" style="font-size:14px"></i></div>
      </div>
    </div>
  </div>

  <script>
    const clients = [
      { id:1,  name:'Ana Paula Ferreira',           type:'PF', tag:'material', tagLabel:'Material Escolar', doc:'CPF: 123.456.789-00',        total:'R$ 189,90',   active:true  },
      { id:2,  name:'Tech Soluções LTDA',            type:'PJ', tag:'uniforme', tagLabel:'Uniforme',         doc:'CNPJ: 12.345.678/0001-90',   total:'R$ 1.250,00', active:true  },
      { id:3,  name:'Carlos Eduardo Lima',           type:'PF', tag:'apostila', tagLabel:'Apostila',         doc:'CPF: 987.654.321-00',        total:'R$ 70,00',    active:true  },
      { id:4,  name:'Escola Estadual Bandeirante',   type:'PJ', tag:'material', tagLabel:'Material Escolar', doc:'CNPJ: 98.765.432/0001-10',   total:'R$ 3.420,00', active:true  },
      { id:5,  name:'Fernanda Oliveira Costa',       type:'PF', tag:'uniforme', tagLabel:'Uniforme',         doc:'CPF: 456.123.789-00',        total:'R$ 239,70',   active:false },
      { id:6,  name:'Grupo Educacional Alfa',        type:'PJ', tag:'apostila', tagLabel:'Apostila',         doc:'CNPJ: 55.444.333/0001-22',   total:'R$ 875,00',   active:true  },
      { id:7,  name:'Roberto Alves Santos',          type:'PF', tag:'material', tagLabel:'Material Escolar', doc:'CPF: 321.654.987-00',        total:'R$ 95,50',    active:true  },
      { id:8,  name:'Instituto de Formação SENAI',   type:'PJ', tag:'uniforme', tagLabel:'Uniforme',         doc:'CNPJ: 11.222.333/0001-44',   total:'R$ 5.990,00', active:false },
      { id:9,  name:'Mariana Souza Pires',           type:'PF', tag:'apostila', tagLabel:'Apostila',         doc:'CPF: 741.852.963-00',        total:'R$ 105,00',   active:true  },
      { id:10, name:'Centro de Treinamento Avante',  type:'PJ', tag:'material', tagLabel:'Material Escolar', doc:'CNPJ: 77.888.999/0001-55',   total:'R$ 2.100,00', active:true  },
    ];

    let currentFilter = 'Todos';

    function tagClass(tag) {
      return { material: 'tag-material', uniforme: 'tag-uniforme', apostila: 'tag-apostila' }[tag] || '';
    }

    function renderClients() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const grid = document.getElementById('clientsGrid');

      const filtered = clients.filter(c => {
        const matchFilter =
          currentFilter === 'Todos' ||
          (currentFilter === 'PF' && c.type === 'PF') ||
          (currentFilter === 'PJ' && c.type === 'PJ') ||
          (currentFilter === 'Inativo' && !c.active);
        const matchSearch = c.name.toLowerCase().includes(search) || c.doc.toLowerCase().includes(search);
        return matchFilter && matchSearch;
      });

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state"><i class="ti ti-users-off"></i>Nenhum cliente encontrado.</div>';
        return;
      }

      grid.innerHTML = filtered.map((c, i) => `
        <div class="client-card">
          <div class="client-num">${i + 1}</div>
          <div class="client-info">
            <div class="client-name">${c.name}</div>
            <div class="client-meta">
              <span class="tag ${tagClass(c.tag)}">${c.tagLabel}</span>
              <span class="client-type">${c.type}</span>
              ${!c.active ? '<span class="tag tag-inativo">Inativo</span>' : ''}
            </div>
            <div class="client-doc">${c.doc}</div>
          </div>
          <div class="client-amount">${c.total}</div>
          <div class="actions">
            <div class="btn-icon" title="Editar"><i class="ti ti-edit" style="font-size:14px"></i></div>
            <div class="btn-icon del" title="Excluir"><i class="ti ti-trash" style="font-size:14px"></i></div>
          </div>
        </div>
      `).join('');
    }

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderClients();
    }

    renderClients();
  </script>
</body>
</html>

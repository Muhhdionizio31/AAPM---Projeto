
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>{{ "Editar" if editando else "Novo" }} Usuário — Estoque</title>
</head>

<body>
    <h1>{{ "Editar usuário" if editando else "Novo usuário" }}</h1>

    {% if erro %}
    <p style="color: red;">{{ erro }}</p>
    {% endif %}

    <!--
        action muda dinamicamente:
        - criação → POST /usuarios/novo
        - edição  → POST /usuarios/{id}/editar
    -->
    <form action="{{ '/usuarios/' + editando.id|string + '/editar' if editando else '/usuarios/novo' }}" method="post">

        <label>Nome:
          
            <input type="text" name="nome"
                value="{{ editando.nome if editando else (valores.nome if valores else '') }}" required>
        </label>
        <br>

        <label>E-mail:
            <input type="email" name="email"
                value="{{ editando.email if editando else (valores.email if valores else '') }}" required>
        </label>
        <br>

        <label>Senha:
            <input type="password" name="senha" {{ "placeholder='Deixe vazio para não alterar'" if editando
                else "required minlength='6'" }}>
        </label>
        <br>

        <label>Perfil de acesso:
            <select name="role">
               
                <option value="operador" {{ 'selected' if (editando and editando.role=='operador' ) or (valores and
                    valores.role=='operador' ) else '' }}>
                    Operador
                </option>
                <option value="admin" {{ 'selected' if (editando and editando.role=='admin' ) or (valores and
                    valores.role=='admin' ) else '' }}>
                    Administrador
                </option>
            </select>
        </label>
        <br>

        <button type="submit">
            {{ "Salvar alterações" if editando else "Criar usuário" }}
        </button>
        <a href="/usuarios">Cancelar</a>
    </form>
</body>

</html>
